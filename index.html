<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Cyber Dashboard</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: #00ffcc;
  overflow-x: hidden;
}

/* 3D Scene */
.scene {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 1000px;
}

/* 3D Card */
.card {
  width: 320px;
  padding: 20px;
  background: rgba(0,0,0,0.85);
  border: 1px solid #00ffcc;
  transform: rotateY(20deg) rotateX(10deg);
  transition: 0.5s;
  box-shadow: 0 0 25px #00ffcc;
  text-align: center;
}

.card:hover {
  transform: rotateY(0deg) rotateX(0deg) scale(1.05);
}

button {
  background: transparent;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  padding: 10px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #00ffcc;
  color: black;
}

.green {
  color: lime;
}

/* Output Terminal */
#output {
  padding: 20px;
  white-space: pre-line;
  max-width: 600px;
  margin: auto;
}

/* Responsive */
@media (max-width: 600px) {
  .card {
    width: 90%;
  }
}
</style>

</head>
<body>

<div class="scene">
  <div class="card">
    <h2>⚡ SYSTEM ACCESS</h2>
    <p>Status: <span class="green">ONLINE</span></p>
    <button onclick="loadData()">Run Scan</button>
  </div>
</div>

<div id="output"></div>

<script>
function loadData() {
  const output = document.getElementById("output");
  output.innerHTML = "Scanning system...\n";

  let i = 0;
  const fakeLogs = [
    "Initializing modules...",
    "Connecting to secure server...",
    "Bypassing firewall...",
    "Accessing encrypted nodes...",
    "Decrypting data...",
    "Fetching results...",
    "Scan complete ✔"
  ];

  const interval = setInterval(() => {
    output.innerHTML += fakeLogs[i] + "\\n";
    i++;
    if (i >= fakeLogs.length) clearInterval(interval);
  }, 600);
}
</script>

</body>
</html>
